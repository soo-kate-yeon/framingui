name: CI Failure Intake

on:
  workflow_run:
    workflows:
      - 'Quality Gate'
      - 'E2E Tests'
      - 'Accessibility Tests'
      - 'Security Scan'
      - 'Publish Integrity Gate'
      - 'Deploy to Vercel'
      - 'Vercel Deploy - Playground Web'
    types:
      - completed

permissions:
  contents: read
  pull-requests: write
  actions: read

concurrency:
  group: ci-failure-intake-${{ github.event.workflow_run.id }}
  cancel-in-progress: false

jobs:
  summarize:
    name: Summarize Failed Checks
    if: github.event.workflow_run.conclusion == 'failure' && github.event.workflow_run.head_branch != ''
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Collect failure metadata
        id: collect
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RUN_ID="${{ github.event.workflow_run.id }}"
          WORKFLOW_NAME="${{ github.event.workflow_run.name }}"

          echo "workflow_name=$WORKFLOW_NAME" >> "$GITHUB_OUTPUT"
          echo "workflow_url=${{ github.event.workflow_run.html_url }}" >> "$GITHUB_OUTPUT"

          gh run view "$RUN_ID" --json jobs --jq '.jobs[] | select(.conclusion == "failure") | .name' > failed_jobs.txt || true
          gh run view "$RUN_ID" --log-failed > failed_logs.txt 2>/dev/null || true

          FAILED_META="$(cat failed_jobs.txt 2>/dev/null; cat failed_logs.txt 2>/dev/null)"
          ROOT_CAUSE="manual investigation required"
          NEXT_ACTION="Review the failing run and repair it on a dedicated fix branch."

          if echo "$FAILED_META" | grep -q 'ERR_PNPM_OUTDATED_LOCKFILE'; then
            ROOT_CAUSE="pnpm lockfile drift"
            NEXT_ACTION="Run pnpm install --lockfile-only, commit pnpm-lock.yaml, and rerun CI."
          elif echo "$FAILED_META" | grep -Eqi 'lint|eslint|prettier|format'; then
            ROOT_CAUSE="lint or formatting regression"
            NEXT_ACTION="Run the lint/format commands locally, commit the fixes, and rerun CI."
          elif echo "$FAILED_META" | grep -Eqi 'typescript|type check|tsc|TS[0-9]{4}'; then
            ROOT_CAUSE="TypeScript or type-level regression"
            NEXT_ACTION="Reproduce the type failure locally before pushing a fix branch."
          elif echo "$FAILED_META" | grep -Eqi 'test|vitest|jest|playwright|e2e'; then
            ROOT_CAUSE="test regression"
            NEXT_ACTION="Reproduce the failing tests locally, fix the regression, and push a follow-up branch."
          elif echo "$FAILED_META" | grep -Eqi 'security|audit|vulnerab'; then
            ROOT_CAUSE="security scan failure"
            NEXT_ACTION="Check whether the failure is a true vulnerability or a setup/install error before changing dependencies."
          elif echo "$FAILED_META" | grep -Eqi 'deploy|vercel|production|preview'; then
            ROOT_CAUSE="deployment failure"
            NEXT_ACTION="Inspect the deployment job and verify credentials, build output, and target environment."
          fi

          echo "root_cause=$ROOT_CAUSE" >> "$GITHUB_OUTPUT"
          echo "next_action=$NEXT_ACTION" >> "$GITHUB_OUTPUT"

          {
            echo "failed_jobs<<EOF"
            if [ -s failed_jobs.txt ]; then
              cat failed_jobs.txt
            else
              echo "(failed job list unavailable)"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Comment on PR (if exists)
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=$(gh pr list --head "${{ github.event.workflow_run.head_branch }}" --json number --jq '.[0].number' 2>/dev/null || true)

          if [ -n "$PR_NUMBER" ] && [ "$PR_NUMBER" != "null" ]; then
            COMMENT_BODY="$(cat <<'COMMENT_EOF'
            ## CI Failure Intake

            Workflow: `${{ steps.collect.outputs.workflow_name }}`
            Run: ${{ steps.collect.outputs.workflow_url }}
            Likely root cause: `${{ steps.collect.outputs.root_cause }}`

            Failed jobs:
            ```text
            ${{ steps.collect.outputs.failed_jobs }}
            ```

            Recommended next step:
            ${{ steps.collect.outputs.next_action }}

            This workflow only summarizes failures. Branch creation, fixes, and pushes are delegated to Codex automation.
            COMMENT_EOF
            )"
            gh pr comment "$PR_NUMBER" --body "$COMMENT_BODY"
          else
            echo "No open PR found for branch ${{ github.event.workflow_run.head_branch }}."
          fi

      - name: Summary
        run: |
          echo "## CI Failure Intake" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Workflow: ${{ steps.collect.outputs.workflow_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Run: ${{ steps.collect.outputs.workflow_url }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Branch: ${{ github.event.workflow_run.head_branch }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Likely root cause: ${{ steps.collect.outputs.root_cause }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Failed Jobs" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.collect.outputs.failed_jobs }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Recommended Next Step" >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.collect.outputs.next_action }}" >> "$GITHUB_STEP_SUMMARY"
