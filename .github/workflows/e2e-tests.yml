name: E2E Tests

on:
  push:
    branches: [master, main]
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:
    inputs:
      suite:
        description: 'Browser E2E suite to run'
        required: false
        default: 'smoke'
        type: choice
        options:
          - smoke
          - full

permissions:
  contents: read
  pull-requests: write

jobs:
  e2e-tests:
    name: Run E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers (chromium only)
        run: pnpm exec playwright install --with-deps chromium
        working-directory: packages/playground-web

      - name: Run nightly smoke E2E
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.suite == 'smoke'
        run: pnpm ci:mcp:nightly
        env:
          CI: true
          PLAYWRIGHT_HEADLESS: true
          PLAYWRIGHT_TEST_BASE_URL: http://localhost:3001

      - name: Build app for manual full E2E
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.suite == 'full'
        run: |
          pnpm --filter @framingui/tokens build
          pnpm --filter @framingui/core build
          pnpm --filter @framingui/ui build
          pnpm --filter @framingui/mcp-server build
          pnpm --filter @framingui/playground-web build

      - name: Run manual full E2E
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.suite == 'full'
        run: pnpm --filter @framingui/playground-web test:e2e:full
        env:
          CI: true
          PLAYWRIGHT_HEADLESS: true
          PLAYWRIGHT_TEST_BASE_URL: http://localhost:3001

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-e2e-report
          path: packages/playground-web/playwright-report/
          retention-days: 30

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-test-results
          path: |
            packages/playground-web/test-results/
            packages/playground-web/playwright-report/
          retention-days: 30
